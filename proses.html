<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesanan Diproses - Cafe In Aja</title>
    <link rel="stylesheet" href="../css/proses.css">
</head>
<body>
    <div class="header">
        <div class="logo">
            <img src="../aset/logo.png" alt="Logo">
            <h1>CAFE IN AJA</h1>
        </div>
    </div>

    <div class="container">
        <div class="status-icon">⏳</div>
        <h1>Pesanan Sedang Diproses</h1>
        <p>Silakan lakukan pembayaran ke kasir</p>
        
        <div class="queue-info">
            <div class="queue-number">No. Antrian: <span id="queueNumber">A001</span></div>
            <div class="queue-status">Siap diambil dalam 10-15 menit</div>
        </div>

        <div class="instructions">
            <h3>Petunjuk:</h3>
            <ul>
                <li>Tunjukkan nomor antrian ini ke kasir</li>
                <li>Lakukan pembayaran tunai</li>
                <li>Simpan struk untuk pengambilan</li>
            </ul>
        </div>

        <button class="btn btn-home" onclick="window.location.href='dashboard.html'">
            🏠 Dashboard
        </button>
    </div>
    <script>
        // Generate random queue number
        const queueNum = 'A' + Math.floor(Math.random() * 999).toString().padStart(3, '0');
        document.getElementById('queueNumber').textContent = queueNum;
    </script>
</body>
</html>
